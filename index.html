<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOMO 手機點餐系統 - 營運正式版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            background-color: #fdfdfd;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .payment-active { border-color: #fbbf24 !important; background-color: #fffbeb !important; border-width: 3px !important; }
        .tab-active { color: #b45309 !important; border-bottom: 4px solid #fbbf24 !important; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.3s ease-out; }
    </style>
</head>
<body class="pb-24">

    <!-- Header -->
    <header class="bg-amber-400 p-6 sticky top-0 z-20 shadow-sm flex justify-between items-center text-slate-900">
        <div>
            <h1 class="text-2xl font-black italic tracking-tighter">DOMO EAT</h1>
            <p class="text-[10px] font-bold opacity-90 underline underline-offset-2 decoration-white decoration-2">三重區 | 線上即時點餐系統</p>
        </div>
        <div class="flex flex-col items-end">
            <span class="bg-slate-900 text-amber-400 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest shadow-lg italic">API Active</span>
        </div>
    </header>

    <!-- 分類導覽列 -->
    <nav id="category-tabs" class="flex overflow-x-auto bg-white border-b sticky top-[88px] z-10 no-scrollbar shadow-sm"></nav>

    <!-- 菜單主內容 -->
    <main id="menu-container" class="p-4 space-y-6 mb-10"></main>

    <!-- 底部購物車預覽條 -->
    <div id="cart-bar" class="fixed bottom-0 left-0 right-0 p-4 bg-white/95 backdrop-blur-md border-t border-gray-100 shadow-[0_-10px_30px_rgba(0,0,0,0.05)] z-30 flex items-center justify-between hidden animate-slide-up">
        <div class="flex items-center gap-3">
            <div class="relative bg-slate-900 p-3 rounded-2xl shadow-inner">
                <i data-lucide="shopping-bag" class="text-amber-400 w-6 h-6"></i>
                <span id="cart-badge" class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-black w-5 h-5 rounded-full flex items-center justify-center border-2 border-white">0</span>
            </div>
            <div>
                <p id="cart-total" class="text-xl font-black text-amber-500 tracking-tight">$0</p>
                <p class="text-[9px] text-gray-400 font-black uppercase">當前總額</p>
            </div>
        </div>
        <button onclick="openCheckout()" class="bg-slate-900 text-white px-10 py-4 rounded-2xl font-black text-sm active:scale-95 transition-transform shadow-xl shadow-slate-200">
            結帳下單
        </button>
    </div>

    <!-- 結帳視窗 Modal -->
    <div id="checkout-modal" class="fixed inset-0 bg-white z-[40] overflow-y-auto hidden">
        <div class="sticky top-0 bg-white/90 backdrop-blur-md z-10 flex items-center justify-between p-6 border-b border-gray-100">
            <h2 class="text-2xl font-black text-slate-800 tracking-tight underline decoration-amber-400 decoration-4">確認您的訂單</h2>
            <button onclick="closeCheckout()" class="p-2 bg-gray-50 rounded-full hover:bg-gray-200 transition-colors"><i data-lucide="x"></i></button>
        </div>

        <div class="p-6 space-y-8 pb-32">
            <!-- 訂單明細 -->
            <section>
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-black text-xs text-gray-400 tracking-widest uppercase flex items-center gap-2 italic">
                        <i data-lucide="list" class="w-3 h-3"></i> 01. Order Summary
                    </h3>
                </div>
                <div id="checkout-items" class="space-y-3"></div>
            </section>

            <!-- 優惠碼 -->
            <section class="bg-amber-50 p-5 rounded-3xl border border-amber-100 shadow-sm">
                <div class="flex items-center gap-2 mb-3">
                    <i data-lucide="tag" class="text-amber-600 w-4 h-4"></i>
                    <label class="text-xs font-black text-amber-800 uppercase">Promo Code (ADA一直漲 折$5)</label>
                </div>
                <div class="flex gap-2">
                    <input id="coupon-input" type="text" placeholder="輸入代碼" class="flex-1 p-4 bg-white rounded-xl border border-amber-200 outline-none font-bold text-sm uppercase shadow-inner">
                    <button onclick="applyCoupon()" class="bg-amber-500 text-white px-6 py-4 rounded-xl font-black text-xs active:scale-95 shadow-md">套用</button>
                </div>
                <p id="coupon-msg" class="text-[10px] mt-2 font-black hidden"></p>
            </section>

            <!-- 桌號姓名 -->
            <section>
                <h3 class="font-black text-xs text-gray-400 tracking-widest uppercase mb-4 italic flex items-center gap-2">
                    <i data-lucide="map-pin" class="w-3 h-3"></i> 02. Location
                </h3>
                <input id="table-input" type="text" placeholder="輸入桌號 或 外帶大名" class="w-full p-4 bg-gray-50 rounded-2xl border-2 border-gray-100 focus:border-amber-400 outline-none font-black text-lg shadow-sm">
            </section>

            <!-- 付款方式 -->
            <section>
                <h3 class="font-black text-xs text-gray-400 tracking-widest uppercase mb-4 italic flex items-center gap-2">
                    <i data-lucide="credit-card" class="w-3 h-3"></i> 03. Payment
                </h3>
                <div class="grid grid-cols-1 gap-3">
                    <button onclick="selectPayment('cash')" id="pay-cash" class="payment-btn p-5 rounded-2xl border-2 flex items-center justify-between transition-all group border-gray-100">
                        <span class="font-black text-slate-700">現場付款 / 櫃檯結帳</span>
                        <div class="w-5 h-5 rounded-full border-2 border-gray-200 group-[.payment-active]:bg-amber-400 group-[.payment-active]:border-amber-400"></div>
                    </button>
                    <button onclick="selectPayment('linepay')" id="pay-linepay" class="payment-btn p-5 rounded-2xl border-2 flex items-center justify-between transition-all group border-gray-100">
                        <span class="font-black text-slate-700">LINE Pay / 街口支付</span>
                        <div class="w-5 h-5 rounded-full border-2 border-gray-200 group-[.payment-active]:bg-amber-400 group-[.payment-active]:border-amber-400"></div>
                    </button>
                    <button onclick="selectPayment('crypto')" id="pay-crypto" class="payment-btn p-5 rounded-2xl border-2 flex items-center justify-between transition-all group border-gray-100">
                        <span class="font-black text-slate-700">虛擬貨幣 (USDT / SOL)</span>
                        <div class="w-5 h-5 rounded-full border-2 border-gray-200 group-[.payment-active]:bg-amber-400 group-[.payment-active]:border-amber-400"></div>
                    </button>
                </div>
            </section>

            <!-- 虛擬貨幣面板 -->
            <div id="crypto-details" class="bg-slate-900 text-white p-6 rounded-3xl space-y-5 hidden animate-slide-up shadow-2xl">
                <div class="flex gap-2">
                    <button onclick="selectCrypto('USDT')" id="crypto-usdt" class="crypto-tab-btn flex-1 py-3 rounded-xl font-black text-xs bg-white text-slate-900">USDT (TRC20)</button>
                    <button onclick="selectCrypto('SOL')" id="crypto-sol" class="crypto-tab-btn flex-1 py-3 rounded-xl font-black text-xs bg-slate-800 text-slate-400">SOL (Solana)</button>
                </div>
                <div class="text-center py-4 border-y border-slate-800">
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">Crypto Market Price</p>
                    <p id="crypto-amount" class="text-3xl font-black text-amber-400 tracking-tighter">Calculating...</p>
                </div>
                <div class="bg-white p-4 rounded-2xl flex flex-col items-center">
                   <div class="w-32 h-32 bg-gray-50 mb-3 flex items-center justify-center text-gray-300 text-[10px] font-black italic shadow-inner">QR CODE</div>
                   <p id="crypto-address" class="text-[8px] text-slate-400 break-all select-all font-mono text-center px-2">請於 CONFIG 設定地址</p>
                </div>
            </div>

            <!-- 結帳總計 -->
            <section class="pt-8 border-t border-gray-100 mb-10">
                <div class="flex justify-between items-end mb-8">
                    <div>
                        <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Grand Total</p>
                        <h3 class="text-4xl font-black text-slate-900">$<span id="final-total">0</span></h3>
                    </div>
                    <p id="discount-display" class="text-[10px] text-red-500 font-black hidden animate-bounce underline decoration-red-200 decoration-2 underline-offset-4">已折抵 -$5 (ADA優惠)</p>
                </div>
                
                <button id="submit-btn" onclick="submitOrder()" class="w-full bg-amber-400 text-slate-900 py-6 rounded-3xl font-black text-xl shadow-xl shadow-amber-100 active:scale-95 transition-all flex items-center justify-center gap-3">
                    <i data-lucide="send" class="w-6 h-6"></i> 確認發送訂單至 LINE
                </button>
            </section>
        </div>
    </div>

    <!-- 成功畫面 Overlay -->
    <div id="success-overlay" class="fixed inset-0 bg-white z-[60] flex flex-col items-center justify-center p-10 text-center hidden">
        <div class="w-24 h-24 bg-green-50 text-green-500 rounded-full flex items-center justify-center mb-8 shadow-inner">
            <i data-lucide="check" class="w-14 h-14"></i>
        </div>
        <h2 class="text-4xl font-black mb-4 text-slate-900 tracking-tight italic">Order Sent!</h2>
        <p class="text-gray-500 mb-10 font-bold leading-relaxed text-sm">您的訂單已成功透過中繼站傳送至老闆 LINE。<br>請留意叫號取餐，謝謝！</p>
        <button onclick="location.reload()" class="w-full max-w-xs py-5 bg-slate-900 text-white rounded-2xl font-black shadow-2xl active:scale-95">回點餐首頁</button>
    </div>

    <script>
        // ==========================================
        // 配置區 (已自動填入您的 GAS URL)
        // ==========================================
        const CONFIG = {
            GAS_URL: "https://script.google.com/macros/s/AKfycbxaTmPc-wCyS3XK3QIZPHzjRzK0lPmSYFBlX5yn36gf5JTKTooFzUops2cZvTk_DIAC/exec", 
            USDT_ADDR: "T9zD_您的真實USDT地址",
            SOL_ADDR: "SOL_您的真實SOLANA地址"
        };

        const MENU_DATA = [
            { category: "漢堡類", items: [{ name: "豬肉漢堡", price: 35 }, { name: "豬排漢堡", price: 45 }, { name: "香雞漢堡", price: 35 }, { name: "鮪魚漢堡", price: 40 }, { name: "培根豬漢堡", price: 50 }, { name: "卡啦雞腿堡", price: 60 }, { name: "牛肉漢堡", price: 50 }] },
            { category: "吐司類", items: [{ name: "烤豬肉總匯", price: 50 }, { name: "烤豬排總匯", price: 60 }, { name: "烤起司蛋吐司", price: 30 }, { name: "烤肉鬆蛋吐司", price: 35 }, { name: "烤玉米蛋吐司", price: 40 }, { name: "烤培根蛋吐司", price: 40 }] },
            { category: "蛋餅類", items: [{ name: "原味蛋餅", price: 25 }, { name: "起司蛋餅", price: 30 }, { name: "玉米蛋餅", price: 40 }, { name: "九層塔蛋餅", price: 30 }, { name: "九層塔乳酪蛋", price: 40 }, { name: "薯餅蛋餅", price: 40 }, { name: "豬排蛋餅", price: 50 }] },
            { category: "飲品點心", items: [{ name: "鐵板麵(黑/蘑)", price: 55 }, { name: "黃金脆薯", price: 35 }, { name: "雞塊(5塊)", price: 35 }, { name: "紅茶", price: 15 }, { name: "奶茶", price: 20 }, { name: "鮮奶茶", price: 25 }, { name: "玉米濃湯", price: 40 }] },
            { category: "特惠餐", items: [{ name: "A餐", price: 55 }, { name: "B餐", price: 65 }, { name: "C餐", price: 75 }, { name: "兒童餐", price: 50 }] }
        ];

        let cart = []; 
        let activeCategory = MENU_DATA[0].category;
        let discount = 0;
        let paymentMethod = 'cash';
        let cryptoType = 'USDT';

        function init() {
            renderTabs();
            renderMenu();
            selectPayment('cash');
            lucide.createIcons();
        }

        function renderTabs() {
            const tabs = document.getElementById('category-tabs');
            tabs.innerHTML = MENU_DATA.map(cat => `
                <button onclick="setActiveCategory('${cat.category}')" 
                    class="px-8 py-5 whitespace-nowrap font-black text-sm transition-all ${activeCategory === cat.category ? 'tab-active' : 'text-gray-400'}">
                    ${cat.category}
                </button>
            `).join('');
        }

        function setActiveCategory(cat) { activeCategory = cat; renderTabs(); renderMenu(); }

        function renderMenu() {
            const container = document.getElementById('menu-container');
            const section = MENU_DATA.find(c => c.category === activeCategory);
            container.innerHTML = section.items.map(item => `
                <div class="bg-white p-5 rounded-3xl shadow-sm flex justify-between items-center border border-gray-100 hover:shadow-md transition-all group">
                    <div class="flex-1">
                        <h3 class="font-black text-slate-800 text-lg group-active:text-amber-500">${item.name}</h3>
                        <p class="text-amber-500 font-black mt-1">$${item.price}</p>
                        <div class="flex gap-2 mt-2">
                             ${["漢堡類", "吐司類", "蛋餅類"].includes(activeCategory) ? 
                             `<button onclick='addToCart("${item.name}", ${item.price + 10}, "加起司+10")' class="text-[9px] font-black bg-orange-50 text-orange-600 px-3 py-1 rounded-full border border-orange-100">+起司</button>` : ''}
                             ${["漢堡類", "飲品點心"].includes(activeCategory) && !item.name.includes("紅茶") ? 
                             `<button onclick='addToCart("${item.name}", ${item.price + 10}, "加蛋+10")' class="text-[9px] font-black bg-amber-50 text-amber-700 px-3 py-1 rounded-full border border-amber-100">+加蛋</button>` : ''}
                        </div>
                    </div>
                    <button onclick='addToCart("${item.name}", ${item.price})' class="bg-amber-400 text-white p-4 rounded-2xl active:scale-90 transition-transform shadow-lg shadow-amber-100">
                        <i data-lucide="plus" class="w-6 h-6"></i>
                    </button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function addToCart(name, price, extra = "") {
            const existing = cart.find(i => i.name === name && i.extra === extra);
            if (existing) existing.qty++;
            else cart.push({ name, price, extra, qty: 1, id: Date.now() + Math.random() });
            updateCart();
        }

        function changeQty(id, delta) {
            const item = cart.find(i => i.id === id);
            if (item) {
                item.qty += delta;
                if (item.qty <= 0) cart = cart.filter(i => i.id !== id);
            }
            updateCart(); renderCheckoutItems(); updateTotal();
            if (cart.length === 0) closeCheckout();
        }

        function removeItem(id) {
            cart = cart.filter(i => i.id !== id);
            updateCart(); renderCheckoutItems(); updateTotal();
            if (cart.length === 0) closeCheckout();
        }

        function updateCart() {
            const bar = document.getElementById('cart-bar');
            const totalQty = cart.reduce((s, i) => s + i.qty, 0);
            const totalVal = cart.reduce((s, i) => s + (i.price * i.qty), 0);
            bar.classList.toggle('hidden', totalQty === 0);
            document.getElementById('cart-badge').innerText = totalQty;
            document.getElementById('cart-total').innerText = `$${totalVal}`;
        }

        function openCheckout() { document.getElementById('checkout-modal').classList.remove('hidden'); renderCheckoutItems(); updateTotal(); }
        function closeCheckout() { document.getElementById('checkout-modal').classList.add('hidden'); }

        function renderCheckoutItems() {
            const container = document.getElementById('checkout-items');
            container.innerHTML = cart.map(item => `
                <div class="flex justify-between items-center bg-gray-50 p-4 rounded-2xl border border-gray-100 animate-slide-up">
                    <div class="flex-1">
                        <p class="font-black text-sm text-slate-800">${item.name} ${item.extra ? `<span class="text-amber-600 text-[10px] ml-1">[${item.extra}]</span>` : ''}</p>
                        <p class="text-[10px] font-bold text-gray-400">$${item.price} / 單份</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <div class="flex items-center bg-white rounded-xl border border-gray-200 px-1 shadow-sm">
                            <button onclick="changeQty(${item.id}, -1)" class="p-1 text-gray-300 active:text-amber-500"><i data-lucide="minus-circle" class="w-4 h-4"></i></button>
                            <span class="w-6 text-center font-black text-xs">${item.qty}</span>
                            <button onclick="changeQty(${item.id}, 1)" class="p-1 text-gray-300 active:text-amber-500"><i data-lucide="plus-circle" class="w-4 h-4"></i></button>
                        </div>
                        <button onclick="removeItem(${item.id})" class="text-red-300 active:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </div>
                </div>
            `).join('');
            document.getElementById('summary-count').innerText = `共 ${cart.reduce((s,i)=>s+i.qty,0)} 項`;
            lucide.createIcons();
        }

        function applyCoupon() {
            const code = document.getElementById('coupon-input').value.trim();
            const msg = document.getElementById('coupon-msg');
            msg.classList.remove('hidden');
            if (code === "ADA一直漲") {
                discount = 5;
                msg.innerText = "SUCCESS: 折扣套用成功，現省 $5 元";
                msg.className = "text-[10px] mt-2 font-black text-green-600 uppercase italic";
            } else {
                discount = 0;
                msg.innerText = "ERROR: 無效或已過期的優惠代碼";
                msg.className = "text-[10px] mt-2 font-black text-red-500 uppercase italic";
            }
            updateTotal();
        }

        function updateTotal() {
            const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
            const final = Math.max(0, total - discount);
            document.getElementById('final-total').innerText = final;
            document.getElementById('discount-display').classList.toggle('hidden', discount === 0);
            updateCryptoUI();
        }

        function selectPayment(m) {
            paymentMethod = m;
            document.querySelectorAll('.payment-btn').forEach(b => b.classList.remove('payment-active'));
            document.getElementById(`pay-${m}`).classList.add('payment-active');
            document.getElementById('crypto-details').classList.toggle('hidden', m !== 'crypto');
            updateCryptoUI();
        }

        function selectCrypto(t) {
            cryptoType = t;
            document.querySelectorAll('.crypto-tab-btn').forEach(b => {
                b.classList.remove('bg-white', 'text-slate-900');
                b.classList.add('bg-slate-800', 'text-slate-400');
            });
            const active = document.getElementById(`crypto-${t.toLowerCase()}`);
            active.classList.replace('bg-slate-800', 'bg-white');
            active.classList.replace('text-slate-400', 'text-slate-900');
            updateCryptoUI();
        }

        function updateCryptoUI() {
            const final = Math.max(0, cart.reduce((s, i) => s + (i.price * i.qty), 0) - discount);
            if (cryptoType === 'USDT') {
                document.getElementById('crypto-amount').innerText = `${(final / 32.3).toFixed(2)} USDT`;
                document.getElementById('crypto-address').innerText = CONFIG.USDT_ADDR;
            } else {
                document.getElementById('crypto-amount').innerText = `${(final / 4850).toFixed(4)} SOL`;
                document.getElementById('crypto-address').innerText = CONFIG.SOL_ADDR;
            }
        }

        async function submitOrder() {
            const table = document.getElementById('table-input').value;
            if (!table) return alert("請填寫桌號或大名以利正確送餐！");
            
            const btn = document.getElementById('submit-btn');
            const originalContent = btn.innerHTML;
            btn.disabled = true;
            btn.innerText = "傳送中...";

            const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
            const final = Math.max(0, total - discount);
            const orderMsg = `🍔 DOMO 新訂單 [${table}]\n-----------------\n方式：${paymentMethod}\n總額：NT$ ${final}\n明細：\n${cart.map(i => `- ${i.name}${i.extra ? `[${i.extra}]` : ''} x${i.qty}`).join('\n')}\n(ADA折扣：${discount > 0 ? '已折5元' : '無'})`;

            try {
                // 使用 URLSearchParams 以簡單請求格式發送，繞過大多數 CORS 封鎖
                const formData = new URLSearchParams();
                formData.append('message', orderMsg);

                await fetch(CONFIG.GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: formData
                });
                
                document.getElementById('success-overlay').classList.remove('hidden');
                lucide.createIcons();
            } catch (e) {
                alert("網路或連線失敗，請直接告知老闆訂單內容！");
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalContent;
                lucide.createIcons();
            }
        }

        window.onload = init;
    </script>
</body>
</html>
